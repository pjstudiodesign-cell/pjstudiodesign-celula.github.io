        body {

            display: block;
            filter: brightness(1.1);
        }

        .hero {

            background-size: cover;

        .service-card li::before { content: "✓ "; color: #ffcc00; font-weight: bold; margin-right: 12px; }

        .portfolio-section { padding: 80px 20px; text-align: center; }
        .swiper { width: 100%; max-width: 950px; height: 500px; border-radius: 20px; background: #111; }
        .swiper-slide { background-size: contain; background-repeat: no-repeat; background-position: center; }
